name: Test mundodeportivo access
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test RSS i article
        run: |
          echo "=== Test RSS Barça ==="
          curl -s -o /dev/null -w "RSS HTTP: %{http_code}\n" \
            "https://www.mundodeportivo.com/rss/futbol/fc-barcelona.xml" \
            -H "User-Agent: Mozilla/5.0"
          
          echo "=== Test article ==="
          URL=$(curl -s "https://www.mundodeportivo.com/rss/futbol/fc-barcelona.xml" \
            -H "User-Agent: Mozilla/5.0" | \
            python3 -c "import sys,xml.etree.ElementTree as ET; r=ET.fromstring(sys.stdin.read()); print(r.find('.//item/link').text.strip())")
          echo "URL: $URL"
          curl -s -o /dev/null -w "Article HTTP: %{http_code}\n" "$URL" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          
          echo "=== IP de GitHub Actions ==="
          curl -s https://api.ipify.org
