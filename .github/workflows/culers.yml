name: Culers · r/Culers (divendres)

on:
  schedule:
    # Divendres a les 09:00 UTC (11:00 hora catalana a l'estiu).
    - cron: "0 9 * * 5"
  workflow_dispatch:
    inputs:
      diagnose:
        description: "Diagnòstic: comprova RSS i article (no encua res)"
        type: boolean
        default: false

# Permís per desar l'històric (output/culers_history.json) de tornada al repo.
permissions:
  contents: write

concurrency:
  group: culers
  cancel-in-progress: false

jobs:
  culers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v5

      - name: Prepara Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Publica la notícia del Barça
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_WRITE_TOKEN: ${{ secrets.WORKER_WRITE_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          CULERS_SUBREDDIT: ${{ secrets.CULERS_SUBREDDIT }}
          DIAGNOSE: ${{ github.event.inputs.diagnose }}
        run: |
          if [ "$DIAGNOSE" = "true" ]; then
            python culers.py --diagnose
          else
            python culers.py --push
          fi

      - name: Desa l'històric (resistent a curses)
        if: always()
        run: |
          bash scripts/sync_queue.sh "chore: històric de culers [skip ci]" output/culers_history.json
