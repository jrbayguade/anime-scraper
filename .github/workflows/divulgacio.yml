name: Divulgació · r/divulgacio (dl i dj)

on:
  schedule:
    # Dilluns 15:30 UTC (17:30 hora catalana a l'estiu) → 7ciències.cat
    - cron: "30 15 * * 1"
    # Dijous 18:00 UTC (20:00 hora catalana a l'estiu) → cienciaoberta.cat
    - cron: "0 18 * * 4"
  workflow_dispatch:
    inputs:
      source:
        description: "Font concreta (cienciaoberta | set7ciencies; buit = calendari)"
        type: string
        default: ""
      diagnose:
        description: "Diagnòstic: comprova API i articles (no encua res)"
        type: boolean
        default: false

# Permís per desar l'històric (output/divulgacio_history.json) de tornada al repo.
permissions:
  contents: write

concurrency:
  group: divulgacio
  cancel-in-progress: false

jobs:
  divulgacio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v5

      - name: Prepara Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Publica article de ciència
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_WRITE_TOKEN: ${{ secrets.WORKER_WRITE_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          DIVULGACIO_SUBREDDIT: ${{ secrets.DIVULGACIO_SUBREDDIT }}
          DIAGNOSE: ${{ github.event.inputs.diagnose }}
          SOURCE: ${{ github.event.inputs.source }}
        run: |
          if [ "$DIAGNOSE" = "true" ]; then
            python divulgacio.py --diagnose
          elif [ -n "$SOURCE" ]; then
            python divulgacio.py --source "$SOURCE" --push
          else
            python divulgacio.py --push
          fi

      - name: Desa l'històric (resistent a curses)
        if: always()
        run: |
          bash scripts/sync_queue.sh "chore: històric de divulgacio [skip ci]" output/divulgacio_history.json
