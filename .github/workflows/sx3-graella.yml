name: SX3 · Graella d'anime (divendres)

# Quan s'executa:
on:
  schedule:
    # Cada DIVENDRES a les 08:50 UTC (10:50 a l'estiu / 09:50 a l'hivern, hora de Catalunya).
    # Format cron: minut hora dia-mes mes dia-setmana  (https://crontab.guru)
    - cron: "50 8 * * 5"
  workflow_dispatch: {}   # botó per executar-lo a mà des de la pestanya "Actions"

# Evita execucions solapades
concurrency:
  group: sx3-graella
  cancel-in-progress: false

jobs:
  graella:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera la graella d'anime i envia-la a make.com
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Reutilitza el webhook del recull setmanal (mateix escenari → r/AnimeCatala)
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python sx3_schedule.py --push --quiet
