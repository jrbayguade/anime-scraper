name: SX3 · Graella d'anime (divendres)

# Quan s'executa:
on:
  schedule:
    # Cada DIVENDRES a les 08:50 UTC (10:50 a l'estiu / 09:50 a l'hivern, hora de Catalunya).
    # Format cron: minut hora dia-mes mes dia-setmana  (https://crontab.guru)
    - cron: "50 8 * * 5"
  workflow_dispatch: {}   # botó per executar-lo a mà des de la pestanya "Actions"

# Permís perquè el job pugui desar la cua (queue/) al repo
permissions:
  contents: write

# Evita execucions solapades
concurrency:
  group: sx3-graella
  cancel-in-progress: false

jobs:
  graella:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v5

      - name: Prepara Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera la graella d'anime i encua-la per a l'extensió
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Cua privada al Cloudflare Worker (substitueix la cua pública de GitHub).
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_WRITE_TOKEN: ${{ secrets.WORKER_WRITE_TOKEN }}
        run: python sx3_schedule.py --push --quiet

      - name: Desa la cua (resistent a curses)
        if: always()
        run: |
          bash scripts/sync_queue.sh "chore: cua de la graella SX3 [skip ci]"
