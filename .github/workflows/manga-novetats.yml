name: Manga · Novetats mensuals (dimarts)

# Quan s'executa:
on:
  schedule:
    # Cada DIMARTS a les 09:00 UTC (10:00 hivern / 11:00 estiu, hora de Catalunya).
    # En dimarts (no dilluns) per repartir: el recull setmanal va dilluns i així
    # no s'acumulen dues actions el mateix dia.
    # El filtre de duplicats fa la majoria d'execucions idempotents (no publiquen res).
    - cron: "0 9 * * 2"
  workflow_dispatch: {}   # botó per executar-lo a mà des de la pestanya "Actions"

# Permís perquè el job pugui desar l'històric (output/bsky_history.json) al repo
permissions:
  contents: write

# Evita execucions solapades
concurrency:
  group: manga-novetats
  cancel-in-progress: false

jobs:
  novetats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Cerca el post mensual i, si n'hi ha de nou, publica'l a make.com
        env:
          # Reutilitza el webhook del canal (mateix escenari → r/AnimeCatala).
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          # Només per a la xarxa de seguretat (si el filtre determinista falla).
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Cua privada al Cloudflare Worker (substitueix la cua pública de GitHub).
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_WRITE_TOKEN: ${{ secrets.WORKER_WRITE_TOKEN }}
        run: python bluesky_manga.py --push --quiet

      - name: Desa l'històric i la cua (resistent a curses)
        if: always()
        run: |
          bash scripts/sync_queue.sh "chore: històric + cua de novetats de manga [skip ci]" output/bsky_history.json
