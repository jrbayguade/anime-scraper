name: Explorant Catalunya · activitats en família (diari)

on:
  schedule:
    # Cada dia a les 06:00 UTC (08:00 hora catalana a l'estiu / 07:00 a l'hivern).
    # explorant.py decideix quines fonts toquen avui (dia de setmana / setmana del
    # mes); la majoria de dies publica 0-1 posts. El cron de GitHub sempre és UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      all:
        description: "Publica TOTES les fonts (ignora el calendari) — per provar"
        type: boolean
        default: false
      diagnose:
        description: "Diagnòstic: mostra què rep cada font (no encua res)"
        type: boolean
        default: false

# Permís per desar l'històric (output/explorant_history.json) de tornada al repo.
permissions:
  contents: write

concurrency:
  group: explorant
  cancel-in-progress: false

jobs:
  explorant:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v5

      - name: Prepara Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Publica les activitats que toquin avui
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_WRITE_TOKEN: ${{ secrets.WORKER_WRITE_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          EXPLORANT_SUBREDDIT: ${{ secrets.EXPLORANT_SUBREDDIT }}
          ALL: ${{ github.event.inputs.all }}
          DIAGNOSE: ${{ github.event.inputs.diagnose }}
        run: |
          if [ "$DIAGNOSE" = "true" ]; then
            python explorant.py --diagnose
          elif [ "$ALL" = "true" ]; then
            python explorant.py --push --quiet --all
          else
            python explorant.py --push --quiet
          fi

      - name: Desa l'històric (resistent a curses)
        if: always()
        run: |
          bash scripts/sync_queue.sh "chore: històric d'explorant [skip ci]" output/explorant_history.json
