name: Recull setmanal d'anime

# Quan s'executa:
on:
  schedule:
    # Cada DILLUNS a les 08:00 UTC (09:00 a l'hivern / 10:00 a l'estiu, hora de Catalunya).
    # Format cron: minut hora dia-mes mes dia-setmana  (https://crontab.guru)
    - cron: "0 8 * * 1"
  workflow_dispatch: {}   # botó per executar-lo a mà des de la pestanya "Actions"

# Permís perquè el job pugui desar l'històric (output/history.json) al repo
permissions:
  contents: write

# Evita execucions solapades
concurrency:
  group: weekly-roundup
  cancel-in-progress: false

jobs:
  roundup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instal·la dependències
        run: pip install -r requirements.txt

      - name: Genera el recull i envia'l a make.com
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python main.py

      - name: Desa l'històric (per no repetir notícies la setmana vinent)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/history.json || true
          git add -f output/posts/*.md 2>/dev/null || true
          git add -f queue/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Res nou a desar."
          else
            git pull --rebase --autostash || true
            git commit -m "chore: històric + cua del recull setmanal [skip ci]"
            git push
          fi
